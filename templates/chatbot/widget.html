{% load i18n %}
<div x-data='chatbotWidget()' x-cloak class="fixed bottom-4 right-4 z-50">
  <button @click="open = !open"
          class="w-14 h-14 rounded-full bg-indigo-600 text-white text-2xl shadow-lg hover:bg-indigo-700">
    🤖
  </button>

  <div x-show="open" x-transition
       class="absolute bottom-16 right-0 w-80 max-w-[90vw] bg-white border border-slate-200 rounded-lg shadow-2xl flex flex-col"
       style="height: 460px;">
    <div class="px-3 py-2 border-b font-semibold text-sm flex items-center justify-between">
      <span>🤖 {% trans "Marketing Assistant" %}</span>
      <button @click="open=false" class="text-slate-400 hover:text-slate-700">✕</button>
    </div>
    <div class="flex-1 overflow-y-auto p-3 space-y-2 text-sm" x-ref="log">
      <template x-for="m in messages" :key="m.id">
        <div :class="m.role === 'user' ? 'text-right' : 'text-left'">
          <span :class="m.role === 'user' ? 'bg-indigo-100 text-indigo-900' : 'bg-slate-100 text-slate-800'"
                class="inline-block px-2 py-1 rounded max-w-[90%]"
                x-text="m.content"></span>
        </div>
      </template>
      <div x-show="loading" class="text-xs text-slate-400">…</div>
    </div>
    <form @submit.prevent="send()" class="p-2 border-t flex gap-1">
      <input x-model="draft" :disabled="loading" type="text"
             placeholder="{% trans 'Ask about campaigns, ROI, angles…' %}"
             class="flex-1 border rounded px-2 py-1 text-sm">
      <button :disabled="loading || !draft.trim()"
              class="bg-indigo-600 text-white text-sm px-3 rounded disabled:opacity-50">↑</button>
    </form>
  </div>
</div>

<script>
function chatbotWidget() {
  return {
    open: false,
    draft: '',
    loading: false,
    messages: [],
    sessionId: null,
    nextId: 1,
    send() {
      const text = this.draft.trim();
      if (!text) return;
      this.messages.push({id: this.nextId++, role: 'user', content: text});
      this.draft = '';
      this.loading = true;
      fetch('/chat/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': document.cookie.split('; ').find(r => r.startsWith('csrftoken='))?.split('=')[1] || '',
        },
        body: JSON.stringify({message: text, session_id: this.sessionId}),
        credentials: 'same-origin',
      })
        .then(r => r.json())
        .then(d => {
          if (d.error) {
            this.messages.push({id: this.nextId++, role: 'assistant', content: '⚠ ' + d.error});
          } else {
            this.sessionId = d.session_id;
            this.messages.push({id: this.nextId++, role: 'assistant', content: d.reply});
          }
        })
        .catch(e => this.messages.push({id: this.nextId++, role: 'assistant', content: '⚠ ' + e}))
        .finally(() => {
          this.loading = false;
          this.$nextTick(() => { this.$refs.log.scrollTop = this.$refs.log.scrollHeight; });
        });
    },
  };
}
</script>
