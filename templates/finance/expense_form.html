{% extends "base.html" %}
{% load i18n %}
{% block content %}
<div class="mx-auto max-w-2xl">
  <div class="mb-5">
    <p class="metric-label">{% trans "Finance input" %}</p>
    <h1 class="text-3xl font-black tracking-tight text-slate-950">{% trans "Log expense" %}</h1>
  </div>
  <form method="post" class="app-card p-5 space-y-4">
    {% csrf_token %}
    <div>
      <label class="mb-1 block text-sm font-bold text-slate-700">{% trans "Campaign" %}</label>
      <select name="campaign" required class="app-input">
        {% for c in campaigns %}<option value="{{ c.id }}">{{ c }}</option>{% endfor %}
      </select>
    </div>
    <div class="grid gap-4 sm:grid-cols-2">
      <div>
        <label class="mb-1 block text-sm font-bold text-slate-700">{% trans "Amount" %}</label>
        <input type="number" step="0.01" name="amount" required class="app-input">
      </div>
      <div>
        <label class="mb-1 block text-sm font-bold text-slate-700">{% trans "Category" %}</label>
        <select name="category" class="app-input">
          {% for v, l in categories %}<option value="{{ v }}">{{ l }}</option>{% endfor %}
        </select>
      </div>
    </div>
    <div>
      <label class="mb-1 block text-sm font-bold text-slate-700">{% trans "Date" %}</label>
      <input type="date" name="date" required class="app-input">
    </div>
    <button class="app-button bg-rose-600 text-white hover:bg-rose-700">
      <i data-lucide="save" class="h-4 w-4"></i>
      {% trans "Save" %}
    </button>
  </form>
</div>
{% endblock %}
