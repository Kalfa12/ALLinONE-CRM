{% extends "base.html" %}
{% load i18n %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">{% trans "Log expense" %}</h1>
<form method="post" class="bg-white p-5 rounded border border-slate-200 max-w-lg space-y-3">
  {% csrf_token %}
  <div>
    <label class="block text-sm font-medium">{% trans "Campaign" %}</label>
    <select name="campaign" required class="w-full border rounded px-2 py-1.5">
      {% for c in campaigns %}<option value="{{ c.id }}">{{ c }}</option>{% endfor %}
    </select>
  </div>
  <div>
    <label class="block text-sm font-medium">{% trans "Amount" %}</label>
    <input type="number" step="0.01" name="amount" required class="w-full border rounded px-2 py-1.5">
  </div>
  <div>
    <label class="block text-sm font-medium">{% trans "Category" %}</label>
    <select name="category" class="w-full border rounded px-2 py-1.5">
      {% for v, l in categories %}<option value="{{ v }}">{{ l }}</option>{% endfor %}
    </select>
  </div>
  <div>
    <label class="block text-sm font-medium">{% trans "Date" %}</label>
    <input type="date" name="date" required class="w-full border rounded px-2 py-1.5">
  </div>
  <button class="px-3 py-2 bg-rose-600 text-white rounded">{% trans "Save" %}</button>
</form>
{% endblock %}
